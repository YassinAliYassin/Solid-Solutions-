name: Deploy to cPanel FTP

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefer-offline || npm install
    
    - name: Build React app
      run: npm run build
    
    - name: Upload to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: cpanel.solidsolutions.africa
        username: solidLLM@solidsolutions.africa
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: /home/solidsol/public_html/
        protocol: ftp  # Explicitly use FTP
        port: 21
        dangerous-clean-sync: false  # Set to true to delete old files
        exclude: |
          **/.git*
          **/.git*/**
    
    - name: Verify deployment
      run: |
        echo "✅ Deployment complete!"
        echo "Visit: https://solidsolutions.africa"
        echo "Check for blue 'AI Tool' button in navigation"
