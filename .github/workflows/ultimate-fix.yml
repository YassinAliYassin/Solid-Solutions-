name: Ultimate Site Diagnostic & Fix

on:
  workflow_dispatch:
  push:
    paths:
      - 'diagnostic**'

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        location: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check site from ${{ matrix.location }}
        run: |
          echo "=== Testing from ${{ matrix.location }} ==="
          echo "1. DNS lookup:"
          nslookup solidsolutions.africa || dig solidsolutions.africa || echo "DNS failed"
          
          echo "2. HTTP test:"
          curl -v -m 10 http://solidsolutions.africa/ 2>&1 || echo "HTTP failed"
          
          echo "3. HTTPS test:"
          curl -v -m 10 https://solidsolutions.africa/ 2>&1 || echo "HTTPS failed"
          
          echo "4. Direct IP test:"
          curl -v -m 10 http://102.208.231.11/ 2>&1 || echo "IP failed"
        continue-on-error: true
      
      - name: Check FTP access
        run: |
          echo "=== Testing FTP ==="
          curl -v -m 10 ftp://solidsol:${{ secrets.FTP_PASSWORD }}@solidsolutions.africa/ 2>&1 || echo "FTP failed"
        continue-on-error: true

  deploy-working-site:
    runs-on: ubuntu-latest
    needs: diagnostic
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create bulletproof index.html
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Solid Solutions - LIVE</title>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh; 
                      display: flex; 
                      align-items: center; 
                      justify-content: center; 
                      padding: 20px;
                  }
                  .card { 
                      background: white; 
                      border-radius: 12px; 
                      padding: 60px 40px; 
                      max-width: 600px; 
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
                      text-align: center; 
                  }
                  h1 { color: #333; margin-bottom: 20px; font-size: 2.5rem; }
                  .status { 
                      background: #d4edda; 
                      color: #155724; 
                      padding: 20px; 
                      border-radius: 8px; 
                      margin: 30px 0; 
                      font-size: 1.2rem;
                      font-weight: bold;
                  }
                  .nav { margin: 30px 0; }
                  .nav a { 
                      display: inline-block; 
                      background: #667eea; 
                      color: white; 
                      padding: 12px 24px; 
                      border-radius: 6px; 
                      text-decoration: none; 
                      margin: 5px;
                      font-weight: 500;
                  }
                  .nav a:hover { background: #764ba2; }
                  .footer { margin-top: 40px; color: #999; font-size: 0.9rem; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>🚀 Solid Solutions</h1>
                  <p style="color: #666; margin-bottom: 10px;">AI & Digital Infrastructure</p>
                  
                  <div class="status">✅ SITE IS LIVE AND WORKING!</div>
                  
                  <p style="color: #555; margin: 20px 0;">
                      If you can see this page, your web server is UP and running correctly.
                      The previous React app was not loading properly.
                  </p>
                  
                  <div class="nav">
                      <a href="/privacy-policy.html">Privacy Policy</a>
                      <a href="/terms-of-service.html">Terms of Service</a>
                      <a href="/test.html">Test Page</a>
                  </div>
                  
                  <div class="footer">
                      <p>✓ Deployed via GitHub Actions</p>
                      <p>✓ Server responding correctly</p>
                      <p>Time: <script>document.write(new Date().toLocaleString())</script></p>
                  </div>
              </div>
          </body>
          </html>
          EOF
          echo "✓ Created working index.html"
      
      - name: Upload working site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: solidsolutions.africa
          username: solidsol
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /home/solidsol/public_html/
          include: index.html
          exclude: |
            **/*
            !index.html
      
      - name: Verify upload
        run: |
          echo "Waiting for DNS propagation..."
          sleep 30
          echo "Testing site..."
          curl -I -m 10 https://solidsolutions.africa/ || echo "Site check failed"
          curl -I -m 10 http://solidsolutions.africa/ || echo "HTTP check failed"
        continue-on-error: true
