name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # ──────────────────────────────────────────────
      # TERMINAL-BASED FTP DEPLOY (using lftp)
      # ──────────────────────────────────────────────
      - name: Deploy via FTP (lftp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp

          # Configure lftp for FTPS (most hosts require this)
          mkdir -p ~/.lftp
          echo "set ssl:verify-certificate false" > ~/.lftp/rc

          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} << EOF
            set ftp:ssl-allow true
            set ftp:passive-mode true
            mirror -R --parallel=8 --delete --verbose ./dist/ public_html/
            bye
          EOF
