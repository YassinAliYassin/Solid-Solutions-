name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'          # speeds up installs

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # ──────────────────────────────────────────────
      # FIXED DEPLOY STEP (this was failing)
      # ──────────────────────────────────────────────
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps                # most hosts use this (try ftp only if it fails)
          port: 21
          timeout: 180000              # 3 minutes — fixes "Timeout (control socket)"
          security: loose              # helps with some certificate issues
          local-dir: ./dist            # ← CHANGE THIS if your build outputs to "build", "public", etc.
          server-dir: ./public_html/   # ← CHANGE THIS to your hosting folder (often public_html/)
          # dry-run: true            # uncomment this line first to test without uploading
