      - name: Deploy via FTP (lftp) - Terminal Agent
        run: |
          echo "Updating package list..."
          sudo apt-get update -qq

          echo "Installing lftp..."
          sudo apt-get install -y lftp

          echo "lftp installed successfully"
          lftp --version

          echo "Checking build output folder..."
          ls -la ./

          # Change this if your build folder is NOT "dist"
          # Common options: dist, build, public, out
          BUILD_FOLDER="./dist"

          if [ -d "$BUILD_FOLDER" ]; then
            echo "Build folder '$BUILD_FOLDER' found"
            ls -la "$BUILD_FOLDER"
          else
            echo "Build folder '$BUILD_FOLDER' NOT found!"
            echo "Run 'npm run build' locally and tell me what folder appears"
            exit 1
          fi

          echo "🔧 Configuring lftp for your host..."
          mkdir -p ~/.lftp
          cat > ~/.lftp/rc << EOF
            set ssl:verify-certificate false
            set ftp:passive-mode true
            set net:timeout 60
            set net:reconnect-interval-base 5
          EOF

          echo "Starting upload to FTP server..."
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} << EOF
            set ftp:ssl-allow true
            mirror -R --parallel=8 --delete --verbose --no-recursion "$BUILD_FOLDER"/ public_html/
            bye
          EOF

          echo "🎉 Deployment finished!"
