name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: cpanel.solidsolutions.africa
          username: solidLLM@solidsolutions.africa
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /home/solidsol/public_html/

      - name: Verify Site Is Live
        run: |
          echo "Checking site status..."
          curl -I -m 10 https://solidsolutions.africa || echo "Site check failed"
          curl -I -m 10 http://solidsolutions.africa || echo "HTTP check failed"
        continue-on-error: true

