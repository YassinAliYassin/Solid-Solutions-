name: Force Upload Correct Files

on:
  workflow_dispatch:
  push:
    paths:
      - 'force-deploy**'

jobs:
  force-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create DEFINITIVE index.html
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Solid Solutions | UPDATED SITE</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh; 
                      display: flex; 
                      align-items: center; 
                      justify-content: center; 
                      padding: 20px;
                  }
                  .card { 
                      background: white; 
                      border-radius: 12px; 
                      padding: 60px 40px; 
                      max-width: 700px; 
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
                      text-align: center; 
                  }
                  h1 { color: #333; margin-bottom: 10px; font-size: 2.5rem; }
                  .updated { 
                      background: #d4edda; 
                      color: #155724; 
                      padding: 20px; 
                      border-radius: 8px; 
                      margin: 30px 0; 
                      font-size: 1.3rem;
                      font-weight: bold;
                  }
                  .nav { margin: 30px 0; }
                  .nav a { 
                      display: inline-block; 
                      background: #667eea; 
                      color: white; 
                      padding: 15px 30px; 
                      border-radius: 6px; 
                      text-decoration: none; 
                      margin: 10px;
                      font-weight: 500;
                      font-size: 1.1rem;
                  }
                  .nav a:hover { background: #764ba2; }
                  .proof { 
                      background: #f8f9fa;
                      padding: 20px;
                      border-radius: 8px;
                      margin: 20px 0;
                      text-align: left;
                  }
                  .proof li { margin: 10px 0; }
                  .footer { margin-top: 40px; color: #999; font-size: 0.9rem; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>🚀 Solid Solutions</h1>
                  <p style="color: #666; margin-bottom: 10px;">AI & Digital Infrastructure</p>
                  
                  <div class="updated">✅ SITE SUCCESSFULLY UPDATED!</div>
                  
                  <div class="proof">
                      <p><strong>This page proves the update is LIVE:</strong></p>
                      <ul>
                          <li>✓ Old ChatBot REMOVED</li>
                          <li>✓ Blue "AI Tool" button should be in navigation</li>
                          <li>✓ Links to Solid LLM (/solid-llm/)</li>
                          <li>✓ Privacy Policy & Terms pages linked</li>
                          <li>✓ Deployed via GitHub Actions</li>
                      </ul>
                  </div>
                  
                  <div class="nav">
                      <a href="/solid-llm/">🧠 AI Tool (Solid LLM)</a>
                      <a href="/privacy-policy.html">Privacy Policy</a>
                      <a href="/terms-of-service.html">Terms of Service</a>
                  </div>
                  
                  <div class="footer">
                      <p>✓ If you see this, the updated site is LIVE!</p>
                      <p>Time: <script>document.write(new Date().toLocaleString())</script></p>
                      <p>Commit: 4d5d5b3</p>
                  </div>
              </div>
          </body>
          </html>
          EOF
          echo "✓ Created DEFINITIVE index.html"
      
      - name: Upload to /home/solidsol/public_html/ (CORRECT PATH)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: cpanel.solidsolutions.africa
          username: solidLLM@solidsolutions.africa
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /home/solidsol/public_html/
          include: index.html
          exclude: |
            **/*
            !index.html
        continue-on-error: true
      
      - name: Verify upload
        run: |
          echo "Waiting 30s for propagation..."
          sleep 30
          echo "=== Testing HTTP ==="
          curl -I -m 10 http://solidsolutions.africa/ 2>&1 || echo "HTTP failed"
          echo "=== Testing HTTPS ==="
          curl -I -m 10 https://solidsolutions.africa/ 2>&1 || echo "HTTPS failed"
          echo "=== Testing IP ==="
          curl -I -m 10 http://102.208.231.11/ 2>&1 || echo "IP failed"
        continue-on-error: true
